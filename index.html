<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon: using the square favicon.jpg for Google Search compatibility -->
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <link rel="apple-touch-icon" href="/favicon.jpg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Korean Fried Chicken | Admin Dashboard & POS</title>
    <meta name="description" content="Korean Fried Chicken - Admin dashboard for POS billing, order management, coupons, and analytics. Coimbatore's best fried chicken." />
    <link rel="canonical" href="https://koreanfriedchicken.in/" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Korean Fried Chicken" />
    <meta property="og:description" content="Admin dashboard & POS system for Korean Fried Chicken, Coimbatore." />
    <meta property="og:url" content="https://koreanfriedchicken.in/" />
    <meta property="og:image" content="/favicon.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Korean Fried Chicken" />
    <meta name="twitter:description" content="Admin dashboard & POS system for Korean Fried Chicken, Coimbatore." />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "name": "Korean Fried Chicken",
      "url": "https://koreanfriedchicken.in/",
      "logo": "https://koreanfriedchicken.in/favicon.jpg",
      "description": "Korean Fried Chicken - Coimbatore's best fried chicken. Bone shot, Big shot, Strips, Loaded fries, French fries, Wrap, Burger.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Komarapalayam",
        "addressRegion": "Coimbatore",
        "addressCountry": "IN"
      },
      "telephone": "+919342489391",
      "servesCuisine": "Korean Fried Chicken"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+Tamil:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
