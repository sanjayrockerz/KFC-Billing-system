<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon: brand logo -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Korean Fried Chicken | Admin Billing</title>
    <meta name="description" content="Korean Fried Chicken admin billing system for POS billing, order management, coupons, customers, and analytics." />
    <link rel="canonical" href="https://example.com/" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Korean Fried Chicken" />
    <meta property="og:description" content="Admin billing system for Korean Fried Chicken." />
    <meta property="og:url" content="https://example.com/" />

    <meta name="twitter:card" content="summary" />

    <!-- Structured data: lets Google show your logo next to search results -->
    <script type="application/ld+json">

      "@context": "https://schema.org",

      "name": "Korean Fried Chicken",
      "url": "https://example.com/",
      "logo": "https://example.com/favicon.jpg",
      "description": "Admin billing system for Korean Fried Chicken."
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
